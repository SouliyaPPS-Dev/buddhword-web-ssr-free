<!doctype html>
<html lang="lo">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="google-site-verification"
      content="9vU2hmc33cx9n-TnpddN5QVNQA7rbC9mZEK3-l6Deck"
    />
    <title>ບໍ່ມີສັນຍານອິນເຕີເນັດ | BuddhaWord</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Noto Sans Lao", sans-serif;
        background: #f5f0e8;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: white;
        border-radius: 24px;
        padding: 40px 28px;
        max-width: 420px;
        width: 100%;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      }
      .icon-wrapper {
        width: 80px;
        height: 80px;
        background: #fef3e2;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
      }
      .icon-wrapper svg {
        width: 40px;
        height: 40px;
        color: #795548;
      }
      h1 {
        font-size: 20px;
        color: #333;
        margin-bottom: 8px;
      }
      p {
        font-size: 14px;
        color: #777;
        line-height: 1.6;
        margin-bottom: 24px;
      }
      .btn {
        display: inline-block;
        background: #795548;
        color: white;
        border: none;
        padding: 12px 28px;
        border-radius: 12px;
        font-size: 15px;
        font-family: inherit;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.2s;
      }
      .btn:hover {
        background: #5e412d;
      }
      .nav-links {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin-top: 24px;
      }
      .nav-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 10px 16px;
        border-radius: 10px;
        background: #f5f0e8;
        color: #795548;
        text-decoration: none;
        font-size: 13px;
        font-weight: 700;
        transition: background 0.2s;
      }
      .nav-link:hover {
        background: #e8dfd0;
      }
      .nav-link img {
        width: 20px;
        height: 20px;
      }
      .divider {
        height: 1px;
        background: #eee;
        margin: 20px 0;
      }
      .hint {
        font-size: 12px;
        color: #aaa;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon-wrapper">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M18.364 5.636a9 9 0 010 12.728m-2.829-2.829a5 5 0 000-7.07m-4.243 4.243a1 1 0 010-1.414"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M3 3l18 18"
          />
        </svg>
      </div>
      <h1>ບໍ່ມີສັນຍານອິນເຕີເນັດ</h1>
      <p>ກະລຸນາກວດສອບການເຊື່ອມຕໍ່ອິນເຕີເນັດຂອງທ່ານ ແລະ ລອງໃໝ່ອີກຄັ້ງ</p>
      <button class="btn" onclick="window.location.reload()">ລອງໃໝ່</button>

      <div class="divider"></div>
      <p style="font-size: 13px; color: #555; margin-bottom: 12px">
        ໜ້າທີ່ສາມາດເປີດໄດ້ໃນໂໝດອອບລາຍ:
      </p>
      <div class="nav-links">
        <a href="/" class="nav-link"
          ><img src="/assets/icons/sutra.png" alt="" />ພຣະສູດ</a
        >
        <a href="/favorites" class="nav-link"
          ><img src="/assets/icons/favorites.png" alt="" />ຖືກໃຈ</a
        >
        <a href="/book" class="nav-link"
          ><img src="/assets/icons/book.png" alt="" />ປື້ມ</a
        >
        <a href="/video" class="nav-link"
          ><img src="/assets/icons/vdo.png" alt="" />Video</a
        >
        <a href="/calendar" class="nav-link"
          ><img src="/assets/icons/calendar.png" alt="" />ປະຕິທິນ</a
        >
        <a href="/about" class="nav-link"
          ><img src="/assets/icons/about.png" alt="" />ຕິດຕໍ່</a
        >
      </div>
    </div>
  </body>
</html>
