<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="400" height="580" viewBox="0 0 400 580">
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B4C3B"/>
      <stop offset="100%" stop-color="#4A3226"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2B1A12"/>
      <stop offset="100%" stop-color="#3D271F"/>
    </linearGradient>
    <linearGradient id="pageEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0E0"/>
      <stop offset="100%" stop-color="#E8E0C8"/>
    </linearGradient>
  </defs>
  <!-- Spine -->
  <rect x="0" y="0" width="28" height="580" fill="url(#spine)"/>
  <!-- Cover -->
  <rect x="28" y="0" width="337" height="580" fill="url(#cover)"/>
  <!-- Page edges -->
  <rect x="365" y="15" width="35" height="565" fill="url(#pageEdge)" rx="2"/>
  <rect x="363" y="18" width="35" height="562" fill="#FDF8EE" rx="2"/>
  <line x1="370" y1="40" x2="392" y2="40" stroke="#D4C9A8" stroke-width="1"/>
  <line x1="370" y1="160" x2="392" y2="160" stroke="#D4C9A8" stroke-width="1"/>
  <line x1="370" y1="280" x2="392" y2="280" stroke="#D4C9A8" stroke-width="1"/>
  <line x1="370" y1="400" x2="392" y2="400" stroke="#D4C9A8" stroke-width="1"/>
  <line x1="370" y1="520" x2="392" y2="520" stroke="#D4C9A8" stroke-width="1"/>
  <!-- Binding edge on cover -->
  <line x1="32" y1="0" x2="32" y2="580" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <!-- Decorative border -->
  <rect x="50" y="25" width="290" height="530" rx="4" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  <!-- Centered buddhaword logo -->
  <image href="../../buddhaword.png" x="98" y="175" width="200" height="200" preserveAspectRatio="xMidYMid meet" opacity="0.85"/>
  <!-- Title bar -->
  <rect x="70" y="420" width="250" height="55" rx="3" fill="rgba(255,255,255,0.08)"/>
  <!-- Decorative lines -->
  <line x1="80" y1="240" x2="310" y2="240" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="80" y1="360" x2="310" y2="360" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
</svg>
